version: 2

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gosec
    - gocyclo
    - prealloc
  settings:
    gosec:
      excludes:
        - G117 # Exported struct field "Secret","ApiKey","AccessKey","AccessToken","ClientSecret" (JSON key "Secret") matches secret pattern

  exclusions:
    warn-unused: true
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go$
        linters:
          - unused
run:
  concurrency: 4
  timeout: 5m